<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - RML Barbershop</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body data-theme="light">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="user-dashboard.html"><span class="brand-mark"><img src="logo.jfif" alt="RML Barbershop logo"></span><span class="brand-name">Barbershop</span></a>
      <div class="header-actions"><nav class="site-nav"><a href="user-status.html">Status</a><a href="user-services.html">Services</a><a href="book.html">Book Now</a><a href="user-profile.html">Profile</a><a href="login.html" data-logout>Log Out</a></nav><button class="theme-toggle" id="themeToggle" type="button">Dark</button></div>

    <main>
      <section class="section">
        <p class="eyebrow">Profile</p>
        <h1>Customer profile.</h1>
        <form class="form-grid">
          <label>Full Name <input type="text" placeholder="Your name"></label>
          <label>Email <input type="email" placeholder="you@example.com"></label>
          <label>Phone <input type="tel" placeholder="Phone number"></label>
          <button class="button button-primary" type="submit">Save Profile</button>
        </form>
      </section>
    </main>
  </div>
